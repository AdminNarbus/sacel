name: Pipeline Sacel diario

on:
  schedule:
    # GitHub Actions usa UTC. Chile alterna entre UTC-3 y UTC-4,
    # por eso se agenda en ambas horas y se filtra a las 09:00 local.
    - cron: "0 12,13 * * *"
  workflow_dispatch:

concurrency:
  group: sacel-diario
  cancel-in-progress: false

jobs:
  pipeline-sacel:
    name: Ejecutar pipeline Sacel
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      TZ: America/Santiago
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SSLMODE: ${{ secrets.DB_SSLMODE || 'require' }}
      DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
      TWILIO_TO: ${{ secrets.TWILIO_TO }}
      SACEL_USER: ${{ secrets.SACEL_USER }}
      SACEL_PASSWORD: ${{ secrets.SACEL_PASSWORD }}
      SEND_WHATSAPP: ${{ secrets.SEND_WHATSAPP || 'false' }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      CORREO: ${{ secrets.CORREO }}
      SEND_EMAIL: ${{ secrets.SEND_EMAIL || 'false' }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          google-chrome --version || chromium --version || true

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pipeline Sacel
        run: |
          xvfb-run -a python "SCRIPTS VS/pipeline_sacel.py"
