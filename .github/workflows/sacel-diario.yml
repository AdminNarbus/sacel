name: Pipeline Sacel diario

on:
  schedule:
    # GitHub Actions usa UTC. Chile alterna entre UTC-3 y UTC-4,
    # por eso se agenda en ambas horas para calzar con las 07:00 local.
    - cron: "0 10,11 * * *"
  workflow_dispatch:

concurrency:
  group: sacel-diario
  cancel-in-progress: false

jobs:
  pipeline-sacel:
    name: Ejecutar pipeline Sacel
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      TZ: America/Santiago
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SSLMODE: ${{ secrets.DB_SSLMODE || 'require' }}
      DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
      TWILIO_TO: ${{ secrets.TWILIO_TO }}
      SACEL_USER: ${{ secrets.SACEL_USER }}
      SACEL_PASSWORD: ${{ secrets.SACEL_PASSWORD }}
      SEND_WHATSAPP: ${{ secrets.SEND_WHATSAPP || 'false' }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      CORREO: ${{ secrets.CORREO }}
      SEND_EMAIL: ${{ secrets.SEND_EMAIL || 'false' }}
      CI: "true"
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias del sistema
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice xvfb wget gnupg
          if ! command -v google-chrome >/dev/null 2>&1; then
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-linux-signing-keyring.gpg
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-signing-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
            sudo apt-get update
            sudo apt-get install -y google-chrome-stable
          fi
          google-chrome --version

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar dependencias Python
        run: |
          python - <<'PY'
          import pandas
          import psycopg2
          import selenium
          import dotenv
          import twilio
          import python_calamine

          print("Python dependencies OK")
          PY

      - name: Validar variables obligatorias
        shell: bash
        run: |
          missing=()
          for name in SACEL_USER SACEL_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ -z "$DEV_DATABASE_URL" ]; then
            for name in DB_HOST DB_NAME DB_USER DB_PASSWORD; do
              if [ -z "${!name}" ]; then
                missing+=("$name")
              fi
            done
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required environment variables: ${missing[*]}"
            echo "Revisa los Repository secrets en Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Ejecutar pipeline Sacel
        run: |
          xvfb-run -a python "SCRIPTS VS/pipeline_sacel.py"

      - name: Subir capturas de error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sacel-error-screenshots
          path: |
            error_sacel_*.png
          if-no-files-found: ignore
